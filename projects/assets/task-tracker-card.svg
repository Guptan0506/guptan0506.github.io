<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="300" fill="#f8fafc"/>
  
  <!-- Decorative pattern -->
  <circle cx="350" cy="30" r="60" fill="#fde2e4" opacity="0.6"/>
  <circle cx="50" cy="250" r="50" fill="#e0f2ff" opacity="0.6"/>
  
  <!-- Main title -->
  <text x="200" y="45" font-size="28" font-weight="bold" text-anchor="middle" fill="#1a1a1a" font-family="Inter, sans-serif">
    📌 My Pinboard
  </text>
  
  <!-- Subtitle -->
  <text x="200" y="70" font-size="14" text-anchor="middle" fill="#666" font-family="Inter, sans-serif">
    Task Management Platform
  </text>
  
  <!-- Task Card 1 (Yellow) -->
  <g>
    <rect x="30" y="95" width="110" height="140" rx="8" fill="#FFF9E6" stroke="#FAC77566" stroke-width="2"/>
    <circle cx="40" cy="105" r="5" fill="#BA7517"/>
    <text x="45" y="120" font-size="12" font-weight="600" fill="#1a1a1a" font-family="Inter, sans-serif">Project 1</text>
    <line x1="40" y1="130" x2="130" y2="130" stroke="#BAB8B8" stroke-width="1"/>
    <text x="40" y="148" font-size="11" fill="#555" font-family="Inter, sans-serif">✓ Task completed</text>
    <text x="40" y="165" font-size="11" fill="#555" font-family="Inter, sans-serif">○ Task pending</text>
    <text x="40" y="182" font-size="11" fill="#555" font-family="Inter, sans-serif">○ Task pending</text>
    <rect x="40" y="200" width="90" height="4" rx="2" fill="#f0f0f0"/>
    <rect x="40" y="200" width="45" height="4" rx="2" fill="#EF9F27"/>
  </g>
  
  <!-- Task Card 2 (Blue) -->
  <g>
    <rect x="155" y="95" width="110" height="140" rx="8" fill="#E8F5FF" stroke="#85B7EB66" stroke-width="2"/>
    <circle cx="165" cy="105" r="5" fill="#185FA5"/>
    <text x="170" y="120" font-size="12" font-weight="600" fill="#1a1a1a" font-family="Inter, sans-serif">Project 2</text>
    <line x1="165" y1="130" x2="255" y2="130" stroke="#BAB8B8" stroke-width="1"/>
    <text x="165" y="148" font-size="11" fill="#555" font-family="Inter, sans-serif">✓ Task completed</text>
    <text x="165" y="165" font-size="11" fill="#555" font-family="Inter, sans-serif">✓ Task completed</text>
    <text x="165" y="182" font-size="11" fill="#555" font-family="Inter, sans-serif">○ Task pending</text>
    <rect x="165" y="200" width="90" height="4" rx="2" fill="#f0f0f0"/>
    <rect x="165" y="200" width="60" height="4" rx="2" fill="#378ADD"/>
  </g>
  
  <!-- Task Card 3 (Green) -->
  <g>
    <rect x="280" y="95" width="110" height="140" rx="8" fill="#F0FBF5" stroke="#5DCAA566" stroke-width="2"/>
    <circle cx="290" cy="105" r="5" fill="#0F6E56"/>
    <text x="295" y="120" font-size="12" font-weight="600" fill="#1a1a1a" font-family="Inter, sans-serif">Project 3</text>
    <line x1="290" y1="130" x2="380" y2="130" stroke="#BAB8B8" stroke-width="1"/>
    <text x="290" y="148" font-size="11" fill="#555" font-family="Inter, sans-serif">○ Add task...</text>
    <text x="290" y="165" font-size="11" fill="#555" font-family="Inter, sans-serif">○ Task pending</text>
    <text x="290" y="182" font-size="11" fill="#555" font-family="Inter, sans-serif">○ Task pending</text>
    <rect x="290" y="200" width="90" height="4" rx="2" fill="#f0f0f0"/>
    <rect x="290" y="200" width="30" height="4" rx="2" fill="#1D9E75"/>
  </g>
  
  <!-- Features at bottom -->
  <g>
    <text x="50" y="270" font-size="11" fill="#666" font-family="Inter, sans-serif">🔐 Auth</text>
    <text x="120" y="270" font-size="11" fill="#666" font-family="Inter, sans-serif">📎 Resources</text>
    <text x="230" y="270" font-size="11" fill="#666" font-family="Inter, sans-serif">☁️ Supabase</text>
    <text x="320" y="270" font-size="11" fill="#666" font-family="Inter, sans-serif">⚡ Real-time</text>
  </g>
</svg>
